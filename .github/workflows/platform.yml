name: Platform CI

# Additive CI for the inference performance platform (apiserver, library, web).
# Kept in a separate workflow file from ci.yml so syncing upstream inference-sim
# never conflicts here. See docs/UPSTREAM-DELTAS.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Build platform packages
        run: go build -v ./apiserver/... ./library/...
      - name: Test platform packages
        run: go test -v -timeout 5m ./apiserver/... ./library/...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck + build
        run: npm run build
