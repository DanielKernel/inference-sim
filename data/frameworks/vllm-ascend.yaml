schema_version: 1
kind: framework
provenance:
  source: "vllm-ascend release notes + Ascend+Qwen design report"
  url: "https://github.com/vllm-project/vllm-ascend"
  retrieved: "2026-06-19"
  notes: "Optimization availability reflects v0.21.0rc1 (2026-06-16) per design report timeline."
items:
  - name: vllm-ascend
    vendor: "vLLM + Huawei"
    latest_version: "v0.21.0rc1"
    languages: [python]
    supported_hardware: [ascend-910b, ascend-950, ascend-310p]
    optimizations:
      - name: "Continuous batching"
        category: scheduling
        description: "Iteration-level scheduling that admits/retires requests per step."
        available: true
        since_version: "v0.18.0"
        notes: ""
      - name: "Chunked prefill"
        category: scheduling
        description: "Splits long prefills into chunks to bound TTFT impact on decodes."
        available: true
        since_version: "v0.18.0"
        notes: ""
      - name: "Prefix cache"
        category: kv_cache
        description: "Reuses KV blocks for shared prompt prefixes."
        available: true
        since_version: "v0.19.1rc1"
        notes: ""
      - name: "KV cache Int8"
        category: quantization
        description: "Int8-quantized KV cache to halve KV bandwidth and raise capacity."
        available: true
        since_version: "v0.20.2rc1"
        notes: "CANN 9.0.0 recommended."
      - name: "Graph mode (ACLGraph)"
        category: graph
        description: "Captures the execution graph for steady-state speedup; first-run compile cost."
        available: true
        since_version: "v0.20.2rc1"
        notes: "eager/full/piecewise/hybrid variants."
      - name: "FlashComm"
        category: comm
        description: "Communication-overlap optimization for tensor-parallel collectives."
        available: true
        since_version: "v0.19.1rc1"
        notes: "Moved from env var to AscendConfig in v0.20.2rc1."
      - name: "Speculative decoding (Eagle3)"
        category: speculative
        description: "Draft-and-verify speculative decoding to cut decode steps."
        available: true
        since_version: "v0.19.1rc1"
        notes: ""
      - name: "Prefill/decode disaggregation"
        category: scheduling
        description: "Separates prefill and decode onto distinct instances (Mooncake connector)."
        available: true
        since_version: "v0.21.0rc1"
        notes: "Hybrid PCP/DCP."
    references:
      - title: "vllm-ascend repository"
        url: "https://github.com/vllm-project/vllm-ascend"
        kind: docs
    tags: [ascend, vllm]
