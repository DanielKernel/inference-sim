        category: kv_cache
        description: "页式 KV 管理，减少碎片并提升有效容量。"
        available: true
        since_version: "v0.2"
        notes: ""
      - name: "Prefix cache"
        category: kv_cache
        description: "共享前缀 KV 复用。"
        available: true
        since_version: "v0.4"
        notes: ""
    references:
